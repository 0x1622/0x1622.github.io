<!DOCTYPE html>
<html>
<head>
	<title>NTA Result Notification</title>
	<style>
		body {
			background: #1A1A1A;
			background: linear-gradient(to bottom right, #1A1A1A, #923434);
		}

		h1 {
			color: #FFA500;
			text-align: center;
			text-shadow: 2px 2px #008000;
		}

		form {
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-top: 20px;
		}

		label {
			font-size: 20px;
			color: #008000;
			margin-bottom: 10px;
		}

		input[type=text] {
			padding: 10px;
			border: none;
			border-radius: 5px;
			box-shadow: 0 0 10px #008000;
			font-size: 18px;
			width: 250px;
			margin-bottom: 20px;
			text-align: center;
			background-color: #f8f8f8;
			color: #008000;
			outline: none;
		}

		input[type=submit] {
			background-color: #FFA500;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			font-size: 18px;
			cursor: pointer;
			transition: background-color 0.3s ease-in-out;
		}

		input[type=submit]:hover {
			background-color: #008000;
		}
	</style>
</head>
<body>
	<h1>NTA Result Notification</h1>
	<p style="color: #f8f8f8;">Enter your phone number below to receive a notification when the results are released:</p>
	<form action="{{ url_for('submit_phone_number') }}" method="post">
		<label for="phone_number">Phone Number:</label>
		<input type="text" name="phone_number" id="phone_number" required>
		<br>
		<input type="submit" value="Submit">
	</form>
</body>
</html>
